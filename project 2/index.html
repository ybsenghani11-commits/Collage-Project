
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Password Generator</h2>
    
    <div class="result-box">
        <span id="password-display"></span>
    </div>

    <div class="option">
        <label>Password Length</label>
        <input type="number" id="length" min="4" max="50" value="12">
    </div>
    
    <div class="option">
        <label>Include Lowercase (abc)</label>
        <input type="checkbox" id="lowercase" checked>
    </div>

    <div class="option">
        <label>Include Uppercase (ABC)</label>
        <input type="checkbox" id="uppercase" checked>
    </div>

    <div class="option">
        <label>Include Numbers (123)</label>
        <input type="checkbox" id="numbers" checked>
    </div>

    <div class="option">
        <label>Include Symbols (@#$)</label>
        <input type="checkbox" id="symbols" checked>
    </div>

    <button class="btn-generate" id="generate-btn">Generate Password</button>
</div>

<script src="script.js"></script>
</body>
</html>
